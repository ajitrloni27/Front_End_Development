<!DOCTYPE html>
<head>
<title> Program 4</title>
</head>
<body>
<h2>Student Registration Form</h2>
<form>
<!-- Student Name -->
<label for="studentName">Full Name:</label>
<input type="text" id="studentName" name="studentName" placeholder="Enter
your full name" required>
<br><br>
<!-- Email Address -->
<label for="email">Email Address:</label>
<input type="email" id="email" name="email" placeholder="Enter your email
address" required>
<br><br>
<!-- Username -->
<label for="username">Username:</label>
<input type="text" id="username" name="username" placeholder="Create a
username" required>
<br><br>
<!-- Password -->
<label for="password">Password:</label>
<input type="password" id="password" name="password" placeholder="Create
a password" required>
<br><br>
<!-- Gender -->
<label>Gender:</label>
<input type="radio" id="male" name="gender" value="male" required>
<label for="male">Male</label>
<input type="radio" id="female" name="gender" value="female" required>
<label for="female">Female</label>
<input type="radio" id="other" name="gender" value="other" required>
<label for="other">Other</label>
<br><br>

<!-- Date of Birth -->
<label for="dob">Date of Birth:</label>
<input type="date" id="dob" name="dob" required>
<br><br>

<!-- Phone Number -->
<label for="phone">Phone Number:</label>
<input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
<br><br>

<!-- Address -->
<label for="address">Address:</label>
<textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address" required></textarea>
<br><br>

<!-- Engineering Stream Selection -->
<label for="stream">Engineering Stream:</label>
<select id="stream" name="stream">
    <option value="Information Science">Information Science Engineering</option>
    <option value="electrical">Electrical Engineering</option>
    <option value="mechanical">Mechanical Engineering</option>
    <option value="civil">Civil Engineering</option>
</select>
<br><br>

<!-- ISE Subjects (Checkboxes) -->
<label>Preferred Information Science Engineering Subjects:</label><br>
<input type="checkbox" id="dataStructures" name="IseSubjects" value="Data Structures">
<label for="dataStructures">Data Structures</label><br>
<input type="checkbox" id="algorithms" name="IseSubjects" value="Algorithms">
<label for="algorithms">Algorithms</label><br>
<form>
    <input type="checkbox" id="dbms" name="IseSubjects" value="Database Management Systems">
    <label for="dbms">Database Management Systems</label><br>

    <input type="checkbox" id="os" name="IseSubjects" value="Operating Systems">
    <label for="os">Operating Systems</label><br>

    <input type="checkbox" id="softwareEngineering" name="IseSubjects" value="Software Engineering">
    <label for="softwareEngineering">Software Engineering</label><br>

    <input type="checkbox" id="ai" name="IseSubjects" value="Artificial Intelligence">
    <label for="ai">Artificial Intelligence</label><br>

    <br><br>
    <button type="submit">Register</button>
</form>
